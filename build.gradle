plugins {
	id "application"
	id "org.openjfx.javafxplugin" version "+"
	id "com.google.osdetector" version "+"
	id "org.beryx.jlink" version "+"
	id "io.freefair.lombok" version "+"
	id "eclipse"
}

version = "1.0.0" // TODO :add release plugin?

ext {
	javaVersion = "22";
	javafxVersion = "22";
	lombokVersion = "1.18.32";
	ikonliVersion = "12.3.1";
	junitVersion = "5.10.2";
	gradleWrapperVersion = "8.7";
}

dependencies {
	implementation files("lib/jextract.jar")
	implementation "org.kordamp.ikonli:ikonli-javafx:$ikonliVersion"
	implementation "org.kordamp.ikonli:ikonli-materialdesign2-pack:$ikonliVersion"
	implementation "org.kordamp.ikonli:ikonli-entypo-pack:$ikonliVersion"
	testImplementation "org.junit.jupiter:junit-jupiter:$junitVersion"
}

java {
	toolchain.languageVersion.set(JavaLanguageVersion.of(javaVersion))
}

lombok {
	version = lombokVersion
}

javafx {
    version = javafxVersion
    modules = [ "javafx.controls" ]
}

application {
	mainModule = "org.nlisker.jextractGUI" // name defined in module-info.java - required by application plugin with modules
	mainClass = "org.nlisker.jextractGUI.JextractGUI" // required by application plugin always
}

test {
	useJUnitPlatform()
}

tasks.withType(JavaExec) {
	jvmArgs += "--enable-preview"
	jvmArgs += "--enable-native-access=org.openjdk.jextract"
}

tasks.withType(JavaCompile).configureEach {
	options.compilerArgs.add("--enable-preview")
	options.setEncoding("UTF-8")
}

eclipse.classpath {
	downloadJavadoc = true
	downloadSources = true
	file.whenMerged {
		entries.findAll {
			it.kind == 'lib' && it.getEntryAttributes().get("test") != "true"
		}.each {
			it.entryAttributes["module"] = "true"
		}
	}
}

var iconSuffix;
switch (osdetector.os) {
	case "windows": iconSuffix = "ico"
		break
	case "linux": iconSuffix = "png"
		break
	case "macos": iconSuffix = "icns"
		break
}
jlink {
	options = ["--strip-debug",
			   "--compress", "zip-6",
			   "--no-header-files",
			   "--no-man-pages"]
	launcher {
		name = "jextractGUI"
		jvmArgs = ["--enable-preview",
				   "--enable-native-access", "org.openjdk.jextract"]
		noConsole = true
	}
	jpackage {
		icon = "src/main/resources/icon." + iconSuffix
		imageOptions = ["--app-content", "LICENSE.txt"]
		imageOptions += ["--app-content", "NOTICE.txt"]
	}
}

var osName = osdetector.os == "linux" ? "ubuntu" : osdetector.os; // matching the yml file
tasks.register("jpackageImageZip", Zip) {
	group = "build"
	description = "Creates a Zips of the jpackage image"
	
	dependsOn tasks.jpackageImage

    archiveFileName = "jextractGUI-" + osName + "-x64.zip"
    destinationDirectory = layout.buildDirectory
    from layout.buildDirectory.dir("jpackage")
}

tasks.named("wrapper") {
	gradleVersion = gradleWrapperVersion
}

gradle.startParameter.showStacktrace = org.gradle.api.logging.configuration.ShowStacktrace.ALWAYS