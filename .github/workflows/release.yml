name: Release

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Operating System"
        required: true
        type: choice
        options:
          - '["ubuntu-24.04", "ubuntu-26.04-arm", "macos-26-intel", "macos-26", "windows-2025"]'
          - '["ubuntu-24.04"]'
          - '["ubuntu-26.04-arm"]'
          - '["macos-26-intel"]'   # x64
          - '["macos-26"]'         # arm64
          - '["windows-2025"]'     # x64

defaults:
  run:
    shell: bash

jobs:
  release:
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
    - name: Checkout sources
      uses: actions/checkout@v7

    - name: Setup Java 
      uses: actions/setup-java@v5
      with:
        distribution: zulu # circumvent jmod issue with temurin in jlink plugin task
        java-version: 26

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Make gradlew executable on Linux/MacOS
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew

    - name: Create zipped jpackage image
      run: ./gradlew jpackageImageZip

    - name: Set version
      id: setVersion
      run: echo "version=$(./gradlew -q printVersion)" >> $GITHUB_ENV

    - name: Set name
      id: setName
      run: echo "artifact_name=$(./gradlew -q printArchiveFileName)" >> $GITHUB_ENV

    - name: Set path
      id: setPath
      run: echo "artifact_path=$(./gradlew -q printArchiveFilePath)" >> $GITHUB_ENV

    - name: Print vars
      run: |
        echo "version=$version"
        echo "artifact_name=$artifact_name"
        echo "artifact_path=$artifact_path"

    - name: Print content
      run: ls "$artifact_path"

    - name: Upload to release
      uses: ncipollo/release-action@v1 #https://github.com/ncipollo/release-action
      with:
        artifacts: ${{ env.artifact_path }}
        tag: "v${{ env.version }}"
        generateReleaseNotes: true
        allowUpdates: true
        draft: true
        artifactErrorsFailBuild: true

    - name: Print result
      run: echo "Released $artifact_name to v$version"
