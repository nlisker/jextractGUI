name: Test

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Operating System"
        required: true
        type: choice
        options:
          - '["ubuntu", "macos", "windows"]'
          - '["windows"]'
          - '["macos"]'
          - '["ubuntu"]'

jobs:
  release:
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
    runs-on: ${{ matrix.os }}-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4
    
    - name: Make gradlew executable on Linux/MacOS
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew
    
    - name: Get the project version
      id: versioning
      run: echo "VERSION=$(${{github.workspace}}/gradlew -q printVersion)" >> "$GITHUB_OUTPUT"

    - name: Print version
      env:
        version: ${{ steps.versioning.outputs.version }}
      run: echo "The version is $VERSION"
