name: Package

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Operating System"
        required: true
        type: choice
        options:
          - '["ubuntu", "macos", "windows"]'
          - '["windows"]'
          - '["macos"]'
          - '["ubuntu"]'
  workflow_call:
    inputs:
      os:
        required: true
        type: string
    outputs:
      version:
        description: "The version number"
        value: ${{ jobs.package.outputs.version }}
      artifact_name:
        description: "The zipped image file name"
        value: ${{ jobs.package.outputs.artifact_name }}

defaults:
  run:
    shell: bash

jobs:
  package:
    strategy:
      matrix:
        os: ${{ fromJson(inputs.os) }}
    runs-on: ${{ matrix.os }}-latest
    outputs:
      version: ${{ steps.setVersion.outputs.version }}
      artifact_name: ${{ steps.setName.outputs.artifact_name }}
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Setup Java 
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 26

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Make gradlew executable on Linux/MacOS
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew

    - name: Create zipped jpackage image
      run: ./gradlew jpackageImageZip --debug

    - name: Set version
      id: setVersion
      run: echo "version=$(./gradlew -q printVersion)" >> $GITHUB_OUTPUT

    - name: Set name
      id: setName
      run: echo "artifact_name=$(./gradlew -q printArchiveFileName)" >> $GITHUB_OUTPUT

    - name: Set path
      id: setPath
      run: echo "artifact_path=$(./gradlew -q printArchiveFilePath)" >> $GITHUB_OUTPUT

    - name: Print vars
      run: |
        echo "version=${{ steps.setVersion.outputs.version }}"
        echo "artifact_name=${{ steps.setName.outputs.artifact_name }}"
        echo "artifact_path=${{ steps.setPath.outputs.artifact_path }}"

    - name: Upload zipped image
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.setName.outputs.artifact_name }} # custom artifact name
        path: ${{ steps.setPath.outputs.artifact_path }} # path+name of what to upload
        if-no-files-found: error
        retention-days: 1