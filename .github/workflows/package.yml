name: Package

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string

jobs:
  package:
    runs-on: ${{ inputs.os }}-latest
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Setup Java 
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: |
          22
          21

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Make gradlew executable on Linux/MacOS
      if: runner.os != 'Windows'
      run: chmod +x ./gradlew

    - name: Create zipped jpackage image
      run: ./gradlew jpackageImageZip

    - name: Upload packages
      uses: actions/upload-artifact@v4
      with:
        name: jextractGUI-${{ inputs.os }}-x64.zip
        path: build/jextractGUI*.zip
        if-no-files-found: error
        retention-days: 1